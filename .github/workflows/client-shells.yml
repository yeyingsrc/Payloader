name: Client Shells

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing v* tag to publish after a successful build
        required: false
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: client-shells-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.platform }} shells
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            targets: win-x64-nsis,win-arm64-nsis,win-ia32-nsis
          - platform: linux
            os: ubuntu-latest
            targets: linux-x64-appimage,linux-arm64-appimage,linux-armv7l-appimage
          - platform: macos
            os: macos-latest
            targets: mac-x64-dmg,mac-arm64-dmg,mac-universal-dmg
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build verified frontend
        run: npm run build
      - name: Build native client shells
        env:
          PAYLOADER_CLIENT_SHELL_TARGETS: ${{ matrix.targets }}
          PAYLOADER_CLIENT_SHELL_OUTPUT_DIR: ${{ github.workspace }}/artifacts/client-shells
          PAYLOADER_SHELL_WINDOWS_CSC_LINK: ${{ matrix.platform == 'windows' && secrets.WINDOWS_CSC_LINK || '' }}
          PAYLOADER_SHELL_WINDOWS_CSC_KEY_PASSWORD: ${{ matrix.platform == 'windows' && secrets.WINDOWS_CSC_KEY_PASSWORD || '' }}
          PAYLOADER_SHELL_MACOS_CSC_LINK: ${{ matrix.platform == 'macos' && secrets.MACOS_CSC_LINK || '' }}
          PAYLOADER_SHELL_MACOS_CSC_KEY_PASSWORD: ${{ matrix.platform == 'macos' && secrets.MACOS_CSC_KEY_PASSWORD || '' }}
          PAYLOADER_SHELL_MACOS_APPLE_ID: ${{ matrix.platform == 'macos' && secrets.APPLE_ID || '' }}
          PAYLOADER_SHELL_MACOS_APP_PASSWORD: ${{ matrix.platform == 'macos' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          PAYLOADER_SHELL_MACOS_TEAM_ID: ${{ matrix.platform == 'macos' && secrets.APPLE_TEAM_ID || '' }}
        run: npm run build:client-shells
      - name: Verify Windows Authenticode trust
        if: matrix.platform == 'windows'
        shell: pwsh
        run: ./scripts/verify-windows-authenticode.ps1 -ArtifactDirectory '${{ github.workspace }}/artifacts/client-shells'
      - name: Smoke native client shell
        if: matrix.platform != 'linux'
        env:
          PAYLOADER_CLIENT_SHELL_OUTPUT_DIR: ${{ github.workspace }}/artifacts/client-shells
          PAYLOADER_CLIENT_PERF_PROFILE: shared-runner
        run: npm run verify:client-shell
      - name: Smoke native Linux client shell
        if: matrix.platform == 'linux'
        env:
          PAYLOADER_CLIENT_SHELL_OUTPUT_DIR: ${{ github.workspace }}/artifacts/client-shells
          PAYLOADER_CLIENT_PERF_PROFILE: shared-runner
        run: xvfb-run --auto-servernum npm run verify:client-shell
      - name: Upload shell partials
        uses: actions/upload-artifact@v4
        with:
          name: client-shells-${{ matrix.platform }}
          path: artifacts/client-shells/*
          if-no-files-found: error
          retention-days: 14

  merge:
    name: Merge shell manifest
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Download native shell artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: client-shells-*
          path: artifacts/client-shells
          merge-multiple: true
      - name: Merge and validate shell manifest
        env:
          PAYLOADER_CLIENT_SHELL_INPUT_DIR: ${{ github.workspace }}/artifacts/client-shells
          PAYLOADER_CLIENT_SHELL_OUTPUT_DIR: ${{ github.workspace }}/artifacts/client-shells
        run: npm run merge:client-shells
      - name: Upload complete shell release
        uses: actions/upload-artifact@v4
        with:
          name: client-shells-release
          path: |
            artifacts/client-shells/Payloader-Client-Setup-*.exe
            artifacts/client-shells/Payloader-Client-*.AppImage
            artifacts/client-shells/Payloader-Client-*.dmg
            artifacts/client-shells/payloader-shell-*.tar.gz
            artifacts/client-shells/payloader-client-shells.json
            artifacts/client-shells/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish shell Release assets
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '')
    needs: merge
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Download complete shell release
        uses: actions/download-artifact@v4
        with:
          name: client-shells-release
          path: artifacts/client-shells
      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ github.event.inputs.release_tag || github.ref_name }}
        run: |
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 || gh release create "$RELEASE_TAG" --verify-tag --title "$RELEASE_TAG" --generate-notes
          gh release upload "$RELEASE_TAG" artifacts/client-shells/* --clobber
          while IFS= read -r asset; do
            case "$asset" in
              Payloader-Client-*.sha256.txt|payloader-shell-*.tar.gz.sha256.txt|payloader-client-shells.json.sha256.txt|payloader-client-shells-windows.json|payloader-client-shells-linux.json|payloader-client-shells-macos.json)
                gh release delete-asset "$RELEASE_TAG" "$asset" --yes
                ;;
            esac
          done < <(gh release view "$RELEASE_TAG" --json assets --jq '.assets[].name')
          RELEASE_VERSION="${RELEASE_TAG#v}"
          cat > release-notes.md <<EOF
          ## Direct client downloads

          | System | Recommended download |
          | --- | --- |
          | Windows x64 | [Download EXE](https://github.com/$GH_REPO/releases/download/$RELEASE_TAG/Payloader-Client-Setup-${RELEASE_VERSION}-x64.exe) |
          | Windows ARM64 | [Download EXE](https://github.com/$GH_REPO/releases/download/$RELEASE_TAG/Payloader-Client-Setup-${RELEASE_VERSION}-arm64.exe) |
          | Linux x64 | [Download AppImage](https://github.com/$GH_REPO/releases/download/$RELEASE_TAG/Payloader-Client-${RELEASE_VERSION}-x64.AppImage) |
          | Linux ARM64 | [Download AppImage](https://github.com/$GH_REPO/releases/download/$RELEASE_TAG/Payloader-Client-${RELEASE_VERSION}-arm64.AppImage) |
          | macOS Intel + Apple Silicon | [Download Universal DMG](https://github.com/$GH_REPO/releases/download/$RELEASE_TAG/Payloader-Client-${RELEASE_VERSION}-universal.dmg) |

          Windows installers use assisted setup and let users choose the destination directory. Windows packages are Authenticode-signed and verified before publishing; new file hashes or publisher certificates may still show reputation warnings while Microsoft SmartScreen reputation accumulates. Linux AppImages can be placed in any user-writable directory; macOS apps can be dragged from the DMG to Applications or another writable folder. Linux users may need to run `chmod +x Payloader-Client-*.AppImage` after downloading. Lowercase `payloader-shell-*` archives are backend shell transports, not the primary end-user downloads.

          [Full changelog](https://github.com/$GH_REPO/commits/$RELEASE_TAG)
          EOF
          gh release edit "$RELEASE_TAG" --notes-file release-notes.md

<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payloader 管理后台登录</title>
    <link rel="stylesheet" href="/admin/admin.css" />
    <link rel="stylesheet" href="/admin/admin-polish.css" />
  </head>
  <body class="login-page">
    <main class="login-shell">
      <section class="login-panel" aria-labelledby="login-title">
        <div class="login-brand">
          <div class="login-mark" aria-hidden="true">P</div>
          <div>
            <h1 id="login-title">Payloader Admin</h1>
          </div>
        </div>

        <form class="login-form" id="login-form" autocomplete="off" novalidate>
          <label class="login-field">
            <span>账号</span>
            <input
              id="username"
              name="username"
              type="text"
              autocomplete="username"
              inputmode="text"
              maxlength="256"
              required
              autofocus
            />
          </label>
          <label class="login-field">
            <span>密码</span>
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="current-password"
              maxlength="1024"
              required
            />
          </label>

          <div class="login-status" id="login-status" role="status" aria-live="polite"></div>
          <button class="login-submit" id="login-submit" type="submit">登录</button>
        </form>
      </section>
    </main>
    <script src="/admin/login.js" defer></script>
  </body>
</html>
